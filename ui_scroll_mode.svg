<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 135" width="480" height="270">
  <defs>
    <style>
      .bg { fill: #000; }
      .line { fill: #333; }
      .text { fill: #EEE; font-family: monospace; font-size: 8px; }
      .label { fill: #EEE; font-family: monospace; font-size: 15px; font-weight: 700; }
      .value { fill: #EEE; font-family: monospace; font-size: 13px; font-weight: 700; }
      .long { fill: #EEE; font-family: monospace; font-size: 7px; }
      .muted { fill: #666; font-family: monospace; font-size: 13px; font-weight: 700; }
      .mutedLong { fill: #666; font-family: monospace; font-size: 7px; }
      .red { fill: #F00; }
      .sel { fill: #1020A0; }
      .track { fill: none; stroke: #333; stroke-width: 10; stroke-linecap: round; }
      .fill { fill: none; stroke: #F00; stroke-width: 10; stroke-linecap: round; }
      .disabledArc { fill: none; stroke: #333; stroke-width: 10; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" width="240" height="135"/>

  <circle cx="8" cy="8" r="5" class="red"/>
  <text x="16" y="11" class="text">ACTIVE</text>
  <text x="174" y="11" class="text">ORBIT ECHO</text>
  <rect x="0" y="18" width="240" height="1" class="line"/>

  <rect x="0" y="56" width="240" height="37" class="sel"/>

  <rect x="0" y="56" width="240" height="1" class="line"/>
  <rect x="0" y="93" width="240" height="1" class="line"/>

  <!-- Section 1: DIV (value only) -->
  <text x="56" y="32" class="label">DIV</text>
  <text x="56" y="45" class="value">1/8</text>
  <text x="8" y="52" class="long">DIVISAO</text>

  <!-- Section 2: OFF with arc -->
  <path d="M 12 80 A 15 15 0 1 1 36 67" class="track"/>
  <path d="M 12 80 A 15 15 0 0 1 26 65" class="fill"/>
  <text x="56" y="69" class="label">OFF</text>
  <text x="56" y="82" class="value">0.50</text>
  <text x="8" y="89" class="long">OFFSET</text>

  <!-- Section 3: FOC with arc -->
  <path d="M 12 117 A 15 15 0 1 1 36 104" class="track"/>
  <path d="M 12 117 A 15 15 0 1 1 30 103" class="fill"/>
  <text x="56" y="106" class="label">FOC</text>
  <text x="56" y="119" class="value">8000</text>
  <text x="8" y="126" class="long">FOCUS</text>

  <rect x="0" y="122" width="240" height="1" class="line"/>
  <text x="4" y="131" class="text">ENC NAV / PUSH EDIT</text>
</svg>
