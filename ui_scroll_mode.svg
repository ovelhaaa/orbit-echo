<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 135" width="480" height="270">
  <defs><style>
    .bg{fill:#000}.line{fill:#333}.txt{fill:#EEE;font-family:monospace;font-size:8px}
    .label{fill:#EEE;font-family:monospace;font-size:14px;font-weight:700}
    .val{fill:#EEE;font-family:monospace;font-size:12px;font-weight:700}
    .foot{fill:#EEE;font-family:monospace;font-size:7px}
    .sel{fill:#0841}.red{fill:#F00}
    .track{fill:none;stroke:#333;stroke-width:8;stroke-linecap:round}
    .fill{fill:none;stroke:#F00;stroke-width:8;stroke-linecap:round}
  </style></defs>
  <rect width="240" height="135" class="bg"/>
  <circle cx="8" cy="8" r="5" class="red"/><text x="16" y="11" class="txt">ACTIVE</text><text x="174" y="11" class="txt">ORBIT ECHO</text>
  <rect x="0" y="18" width="240" height="1" class="line"/>
  <rect x="80" y="20" width="80" height="102" class="sel"/>
  <rect x="80" y="20" width="1" height="102" class="line"/><rect x="160" y="20" width="1" height="102" class="line"/>

  <path d="M 8 74 A 14 14 0 1 1 32 62" class="track"/><path d="M 8 74 A 14 14 0 0 1 24 59" class="fill"/>
  <text x="40" y="42" class="label">FB</text><text x="40" y="56" class="val">0.35</text><text x="4" y="118" class="foot">FEEDBACK</text>

  <path d="M 88 74 A 14 14 0 1 1 112 62" class="track"/><path d="M 88 74 A 14 14 0 0 1 103 59" class="fill"/>
  <text x="120" y="42" class="label">TM</text><text x="120" y="56" class="val">120</text><text x="84" y="118" class="foot">TEMPO BPM</text>

  <text x="200" y="42" class="label">DIV</text><text x="200" y="56" class="val">1/8</text><text x="164" y="118" class="foot">DIVISAO</text>

  <rect x="0" y="122" width="240" height="1" class="line"/><text x="4" y="131" class="txt">ENC NAV / PUSH EDIT</text>
</svg>
