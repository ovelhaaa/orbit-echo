<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 135" width="480" height="270">
  <defs>
    <style>
      .bg { fill: #000000; }
      .text-normal { fill: #EEEEEE; font-family: monospace; font-size: 8px; }
      .text-highlight { fill: #FF0000; font-family: monospace; font-size: 8px; }
      .text-black { fill: #000000; font-family: monospace; font-size: 8px; font-weight: bold; }
      .line { fill: #333333; }
      .red-fill { fill: #FF0000; }
      .track { fill: #333333; }
      .cursor { fill: #FFFFFF; }
      .black-fill { fill: #000000; }
    </style>
  </defs>

  <rect width="240" height="135" class="bg" />

  <!-- Header -->
  <rect x="6" y="6" width="8" height="8" class="red-fill" />
  <text x="20" y="14" class="text-highlight">SYSTEM ACTIVE</text>
  <text x="170" y="14" class="text-normal">ORBIT ECHO</text>
  <rect x="0" y="20" width="240" height="1" class="line" />

  <!-- Middle Line -->
  <rect x="120" y="24" width="1" height="96" class="line" />

  <!-- Grid Items (Edit Mode, MIX selected) -->

  <!-- Item 0: MIX (Editing) -->
  <rect x="4" y="26" width="112" height="28" class="red-fill" />
  <text x="8" y="38" class="text-black">MIX</text>
  <rect x="8" y="44" width="104" height="6" class="track" />
  <rect x="8" y="44" width="36" height="6" class="black-fill" /> <!-- fill is black when editing -->
  <rect x="41" y="42" width="6" height="10" class="cursor" />

  <!-- Item 1: BPM -->
  <text x="126" y="38" class="text-normal">BPM</text>
  <rect x="126" y="44" width="104" height="6" class="track" />
  <rect x="126" y="44" width="35" height="6" class="red-fill" />
  <rect x="158" y="42" width="6" height="10" class="cursor" />

  <!-- Item 2: FEEDBACK -->
  <text x="8" y="70" class="text-normal">FEEDBACK</text>
  <rect x="8" y="76" width="104" height="6" class="track" />
  <rect x="8" y="76" width="36" height="6" class="red-fill" />
  <rect x="41" y="74" width="6" height="10" class="cursor" />

  <!-- Item 3: DIVISION -->
  <text x="126" y="70" class="text-normal">DIVISION</text>
  <rect x="126" y="76" width="104" height="6" class="track" />
  <rect x="126" y="76" width="21" height="6" class="red-fill" />
  <rect x="144" y="74" width="6" height="10" class="cursor" />

  <!-- Item 4: OFFSET -->
  <text x="8" y="102" class="text-normal">OFFSET</text>
  <rect x="8" y="108" width="104" height="6" class="track" />
  <rect x="8" y="108" width="52" height="6" class="red-fill" />
  <rect x="57" y="106" width="6" height="10" class="cursor" />

  <!-- Item 5: FOCUS -->
  <text x="126" y="102" class="text-normal">FOCUS</text>
  <rect x="126" y="108" width="104" height="6" class="track" />
  <rect x="126" y="108" width="81" height="6" class="red-fill" />
  <rect x="204" y="106" width="6" height="10" class="cursor" />

  <!-- Footer -->
  <rect x="0" y="121" width="240" height="1" class="line" />
  <text x="4" y="131" class="text-normal">ENC: NAVIGATE</text>

  <rect x="110" y="126" width="4" height="4" class="red-fill" />
  <rect x="118" y="126" width="4" height="4" class="line" />
  <rect x="126" y="126" width="4" height="4" class="line" />

  <text x="180" y="131" class="text-normal">PUSH: EDIT</text>
</svg>